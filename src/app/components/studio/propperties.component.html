  <header class="h-14 bg-white border-b border-zinc-200 flex items-center justify-between px-6 z-50 shrink-0">
        <div class="flex items-center gap-6">
          <button (click)="backToDashboard()" class="flex items-center gap-2 group">
            <div class="w-8 h-8 bg-zinc-100 rounded-lg flex items-center justify-center group-hover:bg-zinc-900 transition-colors">
              <mat-icon class="text-zinc-500 scale-75 group-hover:text-white">arrow_back</mat-icon>
            </div>
            <span class="text-[10px] font-black uppercase tracking-widest text-zinc-400 group-hover:text-zinc-900 transition-colors">Dashboard</span>
          </button>
          <div class="h-6 w-px bg-zinc-200"></div>
          <div class="flex items-center gap-4">
             <div class="w-8 h-8 bg-zinc-900 rounded-lg flex items-center justify-center">
               <mat-icon class="text-white scale-75">category</mat-icon>
             </div>
             <h1 class="text-xs font-black uppercase tracking-[0.2em] text-zinc-900">Studio</h1>
          </div>
          <div class="h-6 w-px bg-zinc-200"></div>
          <button (click)="goToViewer()" class="text-[10px] font-black uppercase tracking-widest text-zinc-400 hover:text-zinc-900 transition-colors">Viewer</button>
          <div class="h-6 w-px bg-zinc-200"></div>
          <div class="flex flex-col">
            <span class="text-[7px] font-black uppercase text-zinc-400 tracking-widest pl-1 leading-none">Model Selection</span>
            <select (change)="onModelChange($event)" class="h-8 bg-transparent border-none text-[9px] font-black uppercase tracking-widest focus:ring-0 cursor-pointer">
              @for (model of resumeService.SUPPORTED_MODELS; track model.id) {
                <option [value]="model.id" [selected]="model.id === resumeService.getSelectedModel()">{{ model.name }}</option>
              }
            </select>
          </div>
        </div>

        <div class="flex items-center gap-3">
          <div class="flex items-center gap-1">
            <button mat-icon-button (click)="undo()" matTooltip="Undo">
              <mat-icon class="scale-75 text-zinc-500">undo</mat-icon>
            </button>
            <button mat-icon-button (click)="redo()" matTooltip="Redo">
              <mat-icon class="scale-75 text-zinc-500">redo</mat-icon>
            </button>
          </div>

          <div class="flex items-center gap-1">
            <button mat-icon-button (click)="alignSelected('left')" matTooltip="Align Left"><mat-icon>align_horizontal_left</mat-icon></button>
            <button mat-icon-button (click)="alignSelected('center')" matTooltip="Align Center"><mat-icon>align_horizontal_center</mat-icon></button>
            <button mat-icon-button (click)="alignSelected('right')" matTooltip="Align Right"><mat-icon>align_horizontal_right</mat-icon></button>

            <button mat-icon-button (click)="alignVertical('top')" matTooltip="Align Top"><mat-icon>align_vertical_top</mat-icon></button>
            <button mat-icon-button (click)="alignVertical('middle')" matTooltip="Align Middle"><mat-icon>align_vertical_center</mat-icon></button>
            <button mat-icon-button (click)="alignVertical('bottom')" matTooltip="Align Bottom"><mat-icon>align_vertical_bottom</mat-icon></button>

            <button mat-icon-button (click)="distribute('horizontal')" matTooltip="Distribute Horizontally"><mat-icon>space_bar</mat-icon></button>
            <button mat-icon-button (click)="distribute('vertical')" matTooltip="Distribute Vertically"><mat-icon>height</mat-icon></button>
            </div>

          
          <div class="h-6 w-px bg-zinc-200"></div>

          @if (isPremium()) {
            <button mat-button (click)="saveToCloud()" 
                    class="!text-xs !font-black !uppercase !tracking-widest !text-emerald-600 hover:!bg-emerald-50 transition-all">
              <mat-icon class="mr-1">cloud_upload</mat-icon> Save to Cloud
            </button>
          }

          <div class="h-6 w-px bg-zinc-200"></div>
          
          <button mat-flat-button (click)="exportPdf()" 
                  class="!bg-zinc-900 !text-white h-9 px-6 rounded-lg font-black text-[10px] uppercase tracking-widest shadow-lg shadow-zinc-200">
            <mat-icon class="text-sm mr-2">download</mat-icon> Export Document
          </button>
          
          <button mat-stroked-button class="!border-zinc-200 !text-zinc-600 h-9 px-4 rounded-lg font-black text-[10px] uppercase tracking-widest" (click)="share()">
            <mat-icon class="text-sm">share</mat-icon>
          </button>
        </div>
      </header>
