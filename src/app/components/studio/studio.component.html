<div class="h-screen w-full flex flex-col bg-[#F3F4F6] font-sans select-none">

  <!-- Toolbar stays here -->
  <header class="h-14 bg-white border-b border-zinc-200 flex items-center justify-between px-6 z-50 shrink-0">
    <!-- existing toolbar content -->
  </header>

  <!-- Main layout -->
  <div class="flex-1 flex overflow-hidden" [class.flex-row-reverse]="sidebarPosition() === 'right'">

    <!-- Sidebar -->
    <app-sidebar
      [resume]="resume"
      [sidebarPosition]="sidebarPosition()"
      (resumeChange)="updateResume($event)">
    </app-sidebar>

    <!-- Properties Panel -->
    <app-properties
      [resume]="resume"
      (resumeChange)="updateResume($event)">
    </app-properties>

    <!-- Canvas -->
    <app-canvas
      [resume]="resume"
      [activeSectionId]="activeSectionId"
      [activeElementId]="activeElementId"
      (resumeChange)="updateResume($event)">
    </app-canvas>

  </div>
</div>
