<div class="h-screen w-full flex bg-[#F3F4F6] font-sans select-none">
  <!-- Sidebar -->
  <app-sidebar
    [resume]="resume"
    [sidebarPosition]="sidebarPosition()"
    (resumeChange)="updateResume($event)">
  </app-sidebar>
  
  <!-- Main area -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Navbar -->
    <header class="h-14 bg-white border-b border-zinc-200 flex items-center justify-between px-6 shrink-0">
      <div class="flex items-center gap-4">
        <div class="flex items-center bg-zinc-100 rounded-lg p-1">
          <button 
            (click)="resumeService.undo(); resume = resumeService.resumeState()" 
            [disabled]="!resumeService.canUndo()"
            class="p-1.5 rounded-md hover:bg-white hover:shadow-sm disabled:opacity-30 disabled:hover:bg-transparent transition-all"
            matTooltip="Undo">
            <mat-icon class="scale-75">undo</mat-icon>
          </button>
          <button 
            (click)="resumeService.redo(); resume = resumeService.resumeState()" 
            [disabled]="!resumeService.canRedo()"
            class="p-1.5 rounded-md hover:bg-white hover:shadow-sm disabled:opacity-30 disabled:hover:bg-transparent transition-all"
            matTooltip="Redo">
            <mat-icon class="scale-75">redo</mat-icon>
          </button>
        </div>
        
        <div class="h-4 w-px bg-zinc-200"></div>

        <button 
          (click)="resumeService.resetToInitial(); resume = resumeService.resumeState()" 
          class="flex items-center gap-2 px-3 py-1.5 text-[10px] font-black uppercase tracking-widest text-zinc-500 hover:text-red-500 transition-colors"
          matTooltip="Reset All Layers">
          <mat-icon class="scale-75">history</mat-icon>
          Reset
        </button>
      </div>
      <button 
      (click)="goToDashboard()" 
      class="flex items-center gap-2 px-3 py-1.5 text-[10px] font-black uppercase tracking-widest text-zinc-500 hover:text-blue-600 transition-colors"
      matTooltip="Back to Dashboard">
      <mat-icon class="scale-75">arrow_back</mat-icon>
      Dashboard
    </button>

      <div class="flex items-center gap-3">
        <button (click)="exportPdf()" class="flex items-center gap-2 px-4 py-2 bg-zinc-900 text-white rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-zinc-800 transition-all shadow-sm">
          <mat-icon class="scale-75">download</mat-icon>
          Production Export
        </button>
      </div>
    </header>

    <!-- Canvas Area -->
    <div class="flex-1 flex justify-center items-start p-10 overflow-auto no-scrollbar">
      <app-canvas *ngIf="resume" [resume]="resume" (resumeChange)="updateResume($event)">
      </app-canvas>

    </div>
  </div>
</div>
